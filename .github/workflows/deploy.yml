# Build the client and deploy it to GitHub Pages on every push to main.
#
# Replaces the old "Pages serves main /root verbatim" setup: main is now pure
# source (raw ES modules, no cache-bust query strings), and this workflow
# bundles it with esbuild into a content-hashed _site/ that Pages serves via
# the official artifact flow (no gh-pages branch, no committed build output).
#
# One-time repo setting required: Settings -> Pages -> Source = "GitHub Actions".

name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress run finish, but coalesce queued ones so the latest push wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
